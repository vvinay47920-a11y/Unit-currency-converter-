<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit & Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="logo">🔄 Converter Dashboard</h1>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">☀️</button>
        </div>
    </nav>

    <main class="container">
        <div class="card">
            <div class="tab-container">
                <button id="tab-unit" class="tab-btn active">Unit Converter</button>
                <button id="tab-currency" class="tab-btn">Currency Converter</button>
            </div>

            <section id="unit-section" class="converter-section active-section">
                <div class="form-group">
                    <label for="unit-category">Select Category</label>
                    <select id="unit-category">
                        <option value="length">Length</option>
                        <option value="weight">Weight</option>
                        <option value="temperature">Temperature</option>
                        <option value="time">Time</option>
                        <option value="speed">Speed</option>
                    </select>
                </div>

                <div class="grid-inputs">
                    <div class="form-group">
                        <label for="unit-from">From</label>
                        <select id="unit-from"></select>
                    </div>
                    <div class="form-group">
                        <label for="unit-to">To</label>
                        <select id="unit-to"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="unit-value">Value to Convert</label>
                    <input type="number" id="unit-value" placeholder="Enter value" value="1">
                </div>

                <button id="convert-unit-btn" class="primary-btn">Convert Units</button>

                <div class="result-box">
                    <span id="unit-result-text">Result: ---</span>
                </div>
            </section>

            <section id="currency-section" class="converter-section hidden-section">
                <div class="form-group">
                    <label for="currency-amount">Amount</label>
                    <input type="number" id="currency-amount" placeholder="Enter amount" value="1">
                </div>

                <div class="grid-inputs exchange-layout">
                    <div class="form-group">
                        <label for="currency-from">From Currency</label>
                        <select id="currency-from">
                            <option value="USD" selected>USD - United States Dollar</option>
                        </select>
                    </div>
                    
                    <button id="swap-currency-btn" class="swap-btn" aria-label="Swap Currencies">⇄</button>
                    
                    <div class="form-group">
                        <label for="currency-to">To Currency</label>
                        <select id="currency-to">
                            <option value="INR" selected>INR - Indian Rupee</option>
                        </select>
                    </div>
                </div>

                <button id="convert-currency-btn" class="primary-btn">Convert Currency</button>

                <div class="result-box">
                    <div id="currency-loading" class="hidden-section">Loading worldwide live rates...</div>
                    <h2 id="currency-result-text">---</h2>
                    <p id="currency-updated-text" class="meta-text">Rates updated: Check connection</p>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
